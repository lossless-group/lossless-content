# .yamllint.yaml
extends: default

rules:
  # Configure rules that need special handling
  document-start:
    present: false        # Don't require --- at start
    level: warning       # But only warn about it
  
  indentation:
    spaces: 0           # Allow properties at root level
    indent-sequences: whatever  # Allow flexible sequence indentation
    check-multi-line-strings: false
    level: warning      # Only warn about indentation issues

  brackets:
    forbid: true        # Warn about any square bracket usage
    level: warning      # But only warn, don't error

  # Disable rules that conflict with our patterns
  line-length: disable    # Content may have long lines
  truthy: disable        # Allow various boolean formats

  # Configure rules for our specific needs
  quotes:
    level: warning
    quote-type: single    # Only allow single quotes
    required: false       # Don't require all strings to be quoted
    extra-required: 
      - '^og_error_message:'
      - '^error_message:'
      - '^.*_error:'
      - '^description:'
      - '^title:'
    extra-allowed:      # Properties that can be either quoted or unquoted
      - '^date_.*:'     # Timestamp properties
      - '^.*_date:'
      - '^last_.*:'
      - '^created_at:'
      - '^datetime:'
    allow-quoted-quotes: false  # Don't allow nested quotes
    ignore-keys:        # Properties that should NEVER have quotes
      - '^uuid:'
      - '^site_uuid:'
      - '^url:'
      - '^og_.*_url:'   # Matches og_image_url, og_video_url, etc.
      - '^tags:'        # Tags must be unordered list syntax, not quoted array

  # Spacing and formatting rules
  comments:
    level: warning
    require-starting-space: true

  empty-lines:
    level: warning
    max: 1
    max-end: 1

  # Basic file hygiene
  key-duplicates: disable    # Allow duplicates since we're handling AI-generated content
  new-line-at-end-of-file:  # POSIX standard, helps with text processing
    level: warning
  trailing-spaces:          # Remove unnecessary whitespace
    level: warning

  # Array formatting - Disable for tags since they must use unordered list syntax
  key-ordering: disable     # Keys can be in any order
  colons:
    level: warning
    max-spaces-before: 0
    max-spaces-after: 1